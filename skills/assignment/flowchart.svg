<svg viewBox="0 0 620 520" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:"Microsoft YaHei",sans-serif}</style>
<defs>
  <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#666"/></marker>
  <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e74c3c"/></marker>
</defs>

<!-- 输入 -->
<rect x="210" y="10" width="200" height="42" rx="8" fill="#667eea"/>
<text x="310" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">/assignment &lt;文件&gt;</text>
<text x="310" y="44" text-anchor="middle" fill="#ddd" font-size="9">.docx / .pdf / .md</text>

<line x1="310" y1="52" x2="310" y2="72" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 读取 -->
<rect x="180" y="72" width="260" height="35" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.2"/>
<text x="310" y="95" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">word2md / pdf-reader / 直接读取</text>

<line x1="310" y1="107" x2="310" y2="127" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

<!-- [可选] 实验指导书 -->
<rect x="455" y="78" width="150" height="28" rx="6" fill="#fafafa" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
<text x="530" y="97" text-anchor="middle" fill="#aaa" font-size="9">[可选] 实验指导书 PDF</text>

<!-- AI 生成 -->
<rect x="190" y="127" width="240" height="50" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.2"/>
<text x="310" y="148" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold">AI 生成实验报告</text>
<text x="310" y="166" text-anchor="middle" fill="#bf360c" font-size="9">分析题目 → 解答 → 数据 → 图表 → 思考题</text>

<line x1="240" y1="177" x2="175" y2="210" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>
<line x1="380" y1="177" x2="445" y2="210" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 报告.md -->
<rect x="70" y="210" width="200" height="38" rx="6" fill="#fafafa" stroke="#e67e22" stroke-width="1.2"/>
<text x="170" y="227" text-anchor="middle" fill="#c0760a" font-size="11" font-weight="bold">报告.md</text>
<text x="170" y="242" text-anchor="middle" fill="#aaa" font-size="9">备选</text>

<!-- 报告.html -->
<rect x="350" y="210" width="200" height="38" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
<text x="450" y="227" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="bold">报告.html</text>
<text x="450" y="242" text-anchor="middle" fill="#1976d2" font-size="9">默认</text>

<line x1="170" y1="248" x2="170" y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>
<line x1="450" y1="248" x2="450" y2="290" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

<!-- md2tex -->
<rect x="70" y="290" width="200" height="35" rx="6" fill="#fafafa" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
<text x="170" y="312" text-anchor="middle" fill="#888" font-size="10">md2tex（备选）</text>

<!-- html2tex -->
<rect x="350" y="290" width="200" height="35" rx="6" fill="#e1f5fe" stroke="#0288d1" stroke-width="1.2"/>
<text x="450" y="312" text-anchor="middle" fill="#01579b" font-size="10" font-weight="bold">html2tex → xelatex ×2</text>

<line x1="450" y1="325" x2="450" y2="350" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Overfull? -->
<rect x="370" y="350" width="160" height="30" rx="15" fill="#fff5f5" stroke="#e74c3c" stroke-width="1.2"/>
<text x="450" y="370" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">Overfull?</text>

<!-- Yes -->
<line x1="530" y1="365" x2="575" y2="365" stroke="#e74c3c" stroke-width="1" marker-end="url(#ar)"/>
<text x="542" y="358" fill="#e74c3c" font-size="8">是</text>
<rect x="575" y="350" width="38" height="30" rx="5" fill="#ffebee" stroke="#e74c3c" stroke-width="1"/>
<text x="594" y="369" text-anchor="middle" fill="#c62828" font-size="8">修复</text>
<line x1="594" y1="350" x2="594" y2="307" stroke="#e74c3c" stroke-width="1"/>
<line x1="594" y1="307" x2="550" y2="307" stroke="#e74c3c" stroke-width="1" marker-end="url(#ar)"/>

<!-- No -->
<line x1="450" y1="380" x2="450" y2="405" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>
<text x="462" y="398" fill="#43a047" font-size="8">否</text>

<!-- 清理 -->
<rect x="350" y="405" width="200" height="30" rx="6" fill="#fce4ec" stroke="#e84393" stroke-width="1.2"/>
<text x="450" y="424" text-anchor="middle" fill="#ad1457" font-size="10" font-weight="bold">清理中间文件</text>

<line x1="450" y1="435" x2="450" y2="460" stroke="#666" stroke-width="1.2" marker-end="url(#a)"/>

<!-- 最终输出 -->
<rect x="200" y="460" width="500" height="45" rx="8" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.2"/>
<text x="310" y="478" text-anchor="middle" fill="#6a1b9a" font-size="10" font-weight="bold">最终输出</text>
<text x="450" y="496" text-anchor="middle" fill="#8e24aa" font-size="10">报告.md  +  报告.html  +  报告.tex  +  <tspan font-weight="bold">报告.pdf</tspan></text>

<!-- md2tex 虚线到输出 -->
<line x1="170" y1="325" x2="170" y2="482" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="170" y1="482" x2="200" y2="482" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>
</svg>
