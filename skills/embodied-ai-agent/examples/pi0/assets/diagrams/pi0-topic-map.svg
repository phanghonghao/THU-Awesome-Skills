<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#193649"/>
      <stop offset="100%" stop-color="#0b6e4f"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#355766"/>
    </marker>
    <style>
      .title { font: 700 32px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #f9fbfa; }
      .h2 { font: 700 22px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #183040; }
      .body { font: 500 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #304957; }
      .small { font: 500 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #61727d; }
      .tag { font: 700 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0b6e4f; }
    </style>
  </defs>
  <rect width="1200" height="780" fill="#f4f1e8"/>
  <rect x="58" y="44" width="1084" height="108" rx="24" fill="url(#top)"/>
  <text x="92" y="103" class="title">π0 视频整理后的知识拆分框架</text>

  <rect x="380" y="210" width="440" height="146" rx="30" fill="#fffdf9" stroke="#d7d0c3"/>
  <text x="414" y="252" class="h2">总览页：π0 技术路线专题总览</text>
  <text x="414" y="286" class="body">定位：把视频、论文、官方博客和后续研究入口压成一张总地图。</text>
  <text x="414" y="318" class="small">主课题：VLA　相关课题：DiffusionPolicy</text>

  <rect x="102" y="462" width="288" height="186" rx="26" fill="#ffffff" stroke="#d8d2c5"/>
  <text x="130" y="504" class="h2">子页 1：π0 架构拆解</text>
  <text x="130" y="538" class="body">聚焦 VLM、Action Expert、控制回路。</text>
  <text x="130" y="568" class="small">回答：语义理解和连续控制如何分工。</text>
  <rect x="130" y="594" width="96" height="30" rx="15" fill="#dceee7"/>
  <text x="157" y="614" class="tag">VLA</text>

  <rect x="456" y="462" width="288" height="186" rx="26" fill="#ffffff" stroke="#d8d2c5"/>
  <text x="484" y="504" class="h2">子页 2：Flow Matching in VLA</text>
  <text x="484" y="538" class="body">聚焦速度场、推理步数、实时控制。</text>
  <text x="484" y="568" class="small">回答：为什么它比扩散式路线更适合部署。</text>
  <rect x="484" y="594" width="148" height="30" rx="15" fill="#f5e4db"/>
  <text x="505" y="614" class="tag" style="fill:#9f4d31">DiffusionPolicy</text>

  <rect x="810" y="462" width="288" height="186" rx="26" fill="#ffffff" stroke="#d8d2c5"/>
  <text x="838" y="504" class="h2">子页 3：两阶段训练范式</text>
  <text x="838" y="538" class="body">聚焦预训练、后训练、数据工程。</text>
  <text x="838" y="568" class="small">回答：泛化与任务精度如何协同获得。</text>
  <rect x="838" y="594" width="96" height="30" rx="15" fill="#dceee7"/>
  <text x="865" y="614" class="tag">VLA</text>

  <path d="M600 356 V406" stroke="#355766" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 406 L246 462" stroke="#355766" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 406 L600 462" stroke="#355766" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 406 L954 462" stroke="#355766" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="122" y="684" width="952" height="52" rx="20" fill="#eaf4f1" stroke="#c8dfd7"/>
  <text x="152" y="717" class="body">可选增强：如果用户要做汇报封面、知识库头图、抽象概念示意或宣传物料，再提示是否使用 $ai-gen 生图；默认不自动生成。</text>
</svg>
