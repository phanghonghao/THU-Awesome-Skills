<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f4ec"/>
      <stop offset="100%" stop-color="#eef6f2"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15384a"/>
      <stop offset="100%" stop-color="#0b6e4f"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#305363"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #f9fbfa; }
      .subtitle { font: 500 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: rgba(249,251,250,0.86); }
      .h2 { font: 700 24px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #183040; }
      .body { font: 500 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #304957; }
      .small { font: 500 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #58707d; }
      .pill { font: 700 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0b6e4f; }
    </style>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect x="48" y="42" width="1304" height="118" rx="28" fill="url(#hero)"/>
  <text x="88" y="102" class="title">π0 / VLA 技术框架总览</text>
  <text x="88" y="132" class="subtitle">把语义理解、连续控制、训练范式和实机约束拆开看，而不是把它们混成一个“通用大模型”故事。</text>

  <rect x="72" y="206" width="282" height="186" rx="26" fill="#fffdf9" stroke="#d8d2c5"/>
  <text x="100" y="250" class="h2">1. 任务输入层</text>
  <text x="100" y="286" class="body">• 图像观测</text>
  <text x="100" y="316" class="body">• 语言指令</text>
  <text x="100" y="346" class="body">• 机器人关节状态</text>
  <text x="100" y="376" class="small">关键矛盾：语言是离散 token，控制是连续高频信号。</text>

  <rect x="406" y="206" width="282" height="186" rx="26" fill="#f7fbf9" stroke="#bddccf"/>
  <text x="434" y="250" class="h2">2. 语义理解层</text>
  <text x="434" y="286" class="body">预训练 VLM 负责：</text>
  <text x="434" y="316" class="body">• 看懂场景</text>
  <text x="434" y="346" class="body">• 理解语言意图</text>
  <text x="434" y="376" class="small">它提供高层语义条件，不直接承担高频动作控制。</text>

  <rect x="740" y="206" width="282" height="186" rx="26" fill="#fffaf7" stroke="#ebcfbf"/>
  <text x="768" y="250" class="h2">3. 动作专家层</text>
  <text x="768" y="286" class="body">Action Expert 负责：</text>
  <text x="768" y="316" class="body">• 接入关节状态与带噪动作</text>
  <text x="768" y="346" class="body">• 输出动作更新方向</text>
  <text x="768" y="376" class="small">把连续控制问题从通用语言理解模块里拆出来。</text>

  <rect x="1074" y="206" width="252" height="186" rx="26" fill="#fffdf9" stroke="#d8d2c5"/>
  <text x="1102" y="250" class="h2">4. 机器人执行层</text>
  <text x="1102" y="286" class="body">• 速度场积分为动作</text>
  <text x="1102" y="316" class="body">• 进入控制闭环</text>
  <text x="1102" y="346" class="body">• 面向 50Hz 左右控制频率</text>
  <text x="1102" y="376" class="small">部署端关心的是延迟、稳定性和恢复能力。</text>

  <path d="M354 298 H406" stroke="#305363" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M688 298 H740" stroke="#305363" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1022 298 H1074" stroke="#305363" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="92" y="468" width="522" height="268" rx="30" fill="#ffffff" stroke="#d8d2c5"/>
  <text x="124" y="516" class="h2">5. 为什么选 Flow Matching</text>
  <text x="124" y="556" class="body">Diffusion：逐步反向去噪，推理链长，部署更吃延迟预算。</text>
  <text x="124" y="590" class="body">Flow Matching：直接学习从噪声动作到目标动作的速度场。</text>
  <text x="124" y="624" class="body">对 VLA 的价值不是“更新”，而是更适合实时连续控制。</text>
  <rect x="124" y="654" width="186" height="38" rx="19" fill="#dceee7"/>
  <text x="155" y="679" class="pill">少步数推理</text>
  <rect x="328" y="654" width="186" height="38" rx="19" fill="#f5e4db"/>
  <text x="356" y="679" class="pill" style="fill:#a44a2f">更适合闭环控制</text>

  <rect x="666" y="468" width="640" height="268" rx="30" fill="#ffffff" stroke="#d8d2c5"/>
  <text x="698" y="516" class="h2">6. 两阶段训练范式</text>
  <rect x="698" y="548" width="264" height="146" rx="22" fill="#f6fbf8" stroke="#c7dfd4"/>
  <text x="724" y="586" class="body">预训练</text>
  <text x="724" y="618" class="small">• 多机器人 / 多任务 / 多源数据</text>
  <text x="724" y="644" class="small">• 学通用操作基础</text>
  <text x="724" y="670" class="small">• 解决泛化问题</text>
  <rect x="1002" y="548" width="264" height="146" rx="22" fill="#fff8f4" stroke="#efcfbe"/>
  <text x="1028" y="586" class="body">后训练</text>
  <text x="1028" y="618" class="small">• 少量高质量任务数据</text>
  <text x="1028" y="644" class="small">• 拉升专家级性能</text>
  <text x="1028" y="670" class="small">• 解决任务可用性问题</text>
  <path d="M962 620 H1002" stroke="#305363" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="698" y="722" class="small">判断：只做预训练泛化但精度不足；只做后训练效果窄。两者组合才构成可落地路线。</text>
</svg>
